<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <h1>Flow Extractor</h1>
    <p class="subtitle">Captured Power Automate flows</p>
  </header>
  <main>
    <div id="empty-state" class="empty" hidden>
      <p>No flows captured yet.</p>
      <p class="hint">Open a flow's <strong>Details</strong> page in Power Automate<br>(Flows → <em>Your Flow</em> → Details) and refresh the page.</p>
    </div>
    <ul id="flow-list"></ul>
  </main>
  <footer>
    <div class="footer-left">
      <button id="settings-btn" class="btn" title="AI Settings">Settings</button>
      <button id="coffee-btn" class="btn btn-coffee" title="Buy me a coffee">☕ Support</button>
    </div>
    <button id="clear-btn" class="btn-danger" title="Clear all captured flows">Clear All</button>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
